<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Basketball Classic</title>
  
  <!-- A-Frame and physics -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.1/aframe.min.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/ammo.wasm.js"></script>
  <script src="//cdn.8thwall.com/web/aframe/aframe-physics-system-4.2.2.min.js"></script>
  
  <!-- 8thWall engine and modules -->
  <script src="./external/xr/xr.js?v=7" data-preload-chunks="slam"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.8thwall.com/web/landing-page/landing-page.js" crossorigin="anonymous"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    #back-btn {
      position: absolute; top: 16px; left: 16px;
      background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 16px; border-radius: 20px;
      font-family: sans-serif; font-size: 0.75rem; font-weight: 700;
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; z-index: 999; cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Back button to return to scanner menu -->
  <button id="back-btn" onclick="window.location.href='./?experience=buzzer'">Back</button>

  <div id="introCard">
    <div id="cardContainer">
      <img id="introImg" src="basketball-assets/onboarding/logo.png" />
      <p style="font-size: 1.3rem; margin: auto; margin-right: 10%; margin-left: 10%">
        Swipe to throw basketballs. Score as many times as you can in 60 seconds.
      </p>
      <p style="font-size: 1.3rem; margin-top: 0">
        While using AR, make sure <br />
        you’re in a safe location at all times.
      </p>
      <button id="begin">PLAY</button>
    </div>
  </div>

  <div id="countdownContainer">
    <h1 id="countdown">3</h1>
  </div>

  <div id="gameUI">
    <div style="font-family: 'Press Start 2P', cursive">
      SCORE:<span id="score" style="font-family: 'Press Start 2P', cursive">0</span>
    </div>
    <div style="font-family: 'Press Start 2P', cursive">
      0:<span id="timer" style="font-family: 'Press Start 2P', cursive">60</span>
    </div>
  </div>

  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p style="font-family: sans-serif; font-size: 0.9rem; margin: auto; margin-right: 10%; margin-left: 10%">
      You scored <span id="finalScore"></span> times <br />
      <span id="gameOverText"></span>
    </p>
    <button id="playAgain" style="font-family: sans-serif; font-size: 1rem">PLAY AGAIN</button>
  </div>

  <div id="orientationOverlay">
    <div id="message">
      Please step back. <br />
      You are too close to the basket.
    </div>
  </div>

  <a-scene
    physics="driver: ammo; debug: false"
    responsive-immersive
    landing-page
    xrextras-loading
    xrextras-runtime-error
    xrextras-gesture-detector
    renderer="colorManagement: true; webgl2: false"
    gltf-model="dracoDecoderPath: https://cdn.8thwall.com/web/aframe/draco-decoder/"
    xrweb="
      allowedDevices: mobile-and-headsets; 
      disableXrTablet: true;
      disableDefaultEnvironment: true"
    onboarding>
    <a-assets>
      <a-asset-item id="basketball-model" src="./basketball-assets/models/basketball.glb"></a-asset-item>
      <a-asset-item id="hmdarcade-model" src="./basketball-assets/models/arcade.glb"></a-asset-item>
      <a-asset-item id="hoop-model" src="./basketball-assets/models/new-hoop.glb"></a-asset-item>
      <a-asset-item id="hoop-physics" src="./basketball-assets/models/physics-hoop.glb"></a-asset-item>
      <a-asset-item id="environment" src="./basketball-assets/models/environment.glb"></a-asset-item>
      <img id="score-img" src="./basketball-assets/textures/score.png" />
      <video
        id="neon-video"
        muted
        autoplay
        playsinline
        crossorigin="anonymous"
        loop="true"
        src="./basketball-assets/videos/neon.mp4"></video>
      <video
        id="portal-video"
        muted
        autoplay
        playsinline
        crossorigin="anonymous"
        loop="true"
        src="./basketball-assets/videos/portal-video.mp4"></video>
      <video
        id="play-video"
        muted
        autoplay
        playsinline
        crossorigin="anonymous"
        loop="true"
        src="./basketball-assets/videos/play.mp4"></video>
    </a-assets>

    <a-entity
      light="
        type: directional;
        shadowBias: -0.0001;
        intensity: 0.85;
        castShadow: true;
        shadowMapHeight:4096;
        shadowMapWidth:4096;
        shadowCameraTop: 30;
        shadowCameraBottom: -10;
        shadowCameraRight: 20;
        shadowCameraLeft: -20;
        shadowRadius: 2;
        target: #camera"
      xrextras-attach="target: camera; offset: 4 15 6"
      position="0.25 4.3 0.5">
    </a-entity>

    <a-light type="ambient" intensity="0.7"></a-light>

    <!-- Camera + Glove-->
    <a-camera id="camera" position="0 2 0.5" camera-proximity-trigger="radius: 3">
      <a-sphere
        id="hand-collider"
        scale="0.1 0.1 0.1"
        ammo-body="type: kinematic"
        ammo-shape="type: sphere"
        material="transparent: true; opacity: 0; depthWrite: false">
      </a-sphere>
      <a-entity id="basketballLauncher"></a-entity>
    </a-camera>

    <a-sphere id="arcadeProximity" position="0 0 -2.625" visible="false"></a-sphere>

    <a-entity
      id="arcadeEl"
      reflections="type: static"
      scale="1.1 1.1 1.1"
      physics-object2="model: #hmdarcade-model; body: static; shape: mesh"
      position="0 0 -1"
      shadow></a-entity>

    <a-entity
      scale="1.1 1.1 1.1"
      physics-object2="model: #hoop-physics; body: static; shape: mesh"
      position="0 0 -1"></a-entity>

    <a-entity
      reflections="type: static"
      gltf-model="#hoop-model"
      scale="1.1 1.1 1.1"
      position="0 0 -1"
      shadow></a-entity>

    <a-sphere
      id="goal"
      position="0 2.4 -3.5"
      radius=".2"
      color="blue"
      material="transparent: true; opacity: 0"></a-sphere>

    <a-entity
      id="playVideo"
      auto-play-video="video: #play-video"
      material="shader: flat; src: #play-video; blending: additive; side: front; transparent: true"
      geometry="primitive: plane; height: 1; width: 1;"
      scale="1.158 0.695 1"
      rotation="0 0 0"
      position="0 3 -3.627">
    </a-entity>

    <a-entity
      id="portalVideo1"
      auto-play-video="video: #portal-video"
      material="shader: flat; src: #portal-video; blending: additive; side: front; transparent: true"
      geometry="primitive: plane; height: 1; width: 1;"
      scale="2.495 1.326 1"
      rotation="-67.640 000 -90.000"
      position="0 1.262 -2.663">
    </a-entity>

    <a-plane
      id="scored"
      position="0 3.4 -3.3"
      scale="0.001 0.001 0.001"
      material="src: #score-img; side: double; shader: flat; transparent: true">
      ></a-plane>

    <a-entity
      id="neonVideo1"
      auto-play-video="video: #neon-video"
      material="shader: flat; src: #neon-video; blending: additive; side: front; transparent: true"
      geometry="primitive: circle"
      scale="0.324 0.289 1"
      rotation="-90 0 0"
      position="0 0.981 -0.7484">
    </a-entity>

    <a-entity
      id="neonVideo2"
      auto-play-video="video: #neon-video"
      material="shader: flat; src: #neon-video; blending: additive; side: front; transparent: true"
      geometry="primitive: circle"
      scale="0.324 0.289 1"
      rotation="-90 0 0"
      position="0 0.997 -0.7484">
    </a-entity>

    <a-entity
      id="neonVideo3"
      auto-play-video="video: #neon-video"
      material="shader: flat; src: #neon-video; blending: additive; side: front; transparent: true"
      geometry="primitive: circle"
      scale="0.324 0.289 1"
      rotation="-90 0 0"
      position="0 1.007 -0.7484">
    </a-entity>

    <a-plane
      id="ground"
      height="100"
      width="100"
      rotation="-90 0 0"
      position="0 0.01 0"
      material="shader: shadow; transparent: true; opacity: 0.4"
      ammo-body="type: static"
      ammo-shape="type: box"
      set-restitution="restitution: 1"
      shadow>
    </a-plane>
  </a-scene>

  <script type="module" src="./src/basketball-classic-app.js"></script>
</body>
</html>
