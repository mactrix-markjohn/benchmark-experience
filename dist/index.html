<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Benchmark AR Experience</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <script src="./external/xr/xr.js?v=7" async data-preload-chunks="face, slam"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.8thwall.com/web/landing-page/landing-page.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --font: 'Outfit', sans-serif;
      --cyan: #00f2fe;
      --purple: #8a2be2;
      --glass: rgba(0, 0, 0, 0.45);
      --glass-solid: rgba(10, 10, 18, 0.92);
      --radius: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      width: 100%; height: 100%; overflow: hidden;
      font-family: var(--font); background: #05050a; color: #fff;
      -webkit-user-select: none; user-select: none;
    }

    /* --- Canvas --- */
    #camerafeed {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 1; display: block;
    }

    /* --- Menu Screen --- */
    #menu-screen {
      position: absolute; inset: 0; z-index: 200;
      background: radial-gradient(circle at center, #150f2d, #05050a);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 32px; text-align: center;
    }
    .menu-logo {
      font-size: 2.2rem; font-weight: 800;
      background: linear-gradient(45deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .menu-sub {
      font-size: 0.8rem; color: #666; letter-spacing: 2px;
      text-transform: uppercase; font-weight: 600; margin-bottom: 36px;
    }
    .menu-cards {
      display: flex; flex-direction: column; gap: 16px;
      width: 100%; max-width: 320px;
    }
    .menu-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 24px;
      cursor: pointer; transition: all 0.2s ease;
      text-align: left;
    }
    .menu-card:active { transform: scale(0.97); }
    .menu-card-icon { font-size: 1.8rem; margin-bottom: 10px; }
    .menu-card-title { font-size: 1rem; font-weight: 800; margin-bottom: 6px; }
    .menu-card-desc { font-size: 0.8rem; color: #888; line-height: 1.4; }
    .menu-card.mascot { border-color: rgba(0,242,254,0.2); }
    .menu-card.mascot:active { border-color: var(--cyan); }
    .menu-card.mask { border-color: rgba(138,43,226,0.2); }
    .menu-card.mask:active { border-color: var(--purple); }

    /* --- Back button --- */
    #back-btn {
      position: absolute; top: 16px; left: 16px;
      background: var(--glass); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 16px; border-radius: 20px;
      font-family: var(--font); font-size: 0.75rem; font-weight: 700;
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; z-index: 999; cursor: pointer;
      display: none;
    }
    #back-btn:active { transform: scale(0.95); }

    /* --- HUD --- */
    #score-pill {
      position: absolute; top: 16px; right: 16px;
      background: var(--glass); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 6px 14px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
      border: 1px solid rgba(255,255,255,0.12);
      z-index: 999; display: none;
      color: var(--cyan);
    }

    #instruction {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--glass); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 10px 20px; border-radius: 24px;
      font-size: 0.8rem; font-weight: 600; text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
      z-index: 999; display: none;
      max-width: 85%; white-space: nowrap;
      color: rgba(255,255,255,0.9);
    }

    /* --- Found overlay --- */
    #found-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    #found-overlay.active { opacity: 1; pointer-events: auto; }
    .found-card {
      background: var(--glass-solid);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 28px; text-align: center;
      max-width: 300px; width: 85%;
    }
    .found-label {
      font-size: 0.65rem; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; color: var(--cyan); margin-bottom: 8px;
    }
    .found-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 12px; }
    .found-pts { font-size: 1.6rem; font-weight: 800; color: var(--cyan); margin-bottom: 6px; }
    .found-pts-label {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,0.5); margin-bottom: 20px;
    }
    .btn-primary {
      width: 100%; border: none; color: #fff;
      font-family: var(--font); font-size: 0.9rem; font-weight: 700;
      padding: 14px; border-radius: 28px; cursor: pointer;
      background: linear-gradient(45deg, var(--purple), var(--cyan));
      box-shadow: 0 4px 15px rgba(138,43,226,0.35);
    }

    /* --- Shutter --- */
    #shutter-container {
      position: absolute; bottom: 32px; left: 0; width: 100%;
      display: none; justify-content: center; z-index: 999;
    }
    #shutter-btn {
      width: 64px; height: 64px; border-radius: 50%;
      background: #fff; border: 4px solid var(--cyan);
      box-shadow: 0 0 16px rgba(0,242,254,0.5);
      cursor: pointer;
    }
    #shutter-btn:active { transform: scale(0.9); }

    /* --- Flash --- */
    #flash-container {
      position: absolute; inset: 0;
      background: #fff; opacity: 0; z-index: 9;
      pointer-events: none; transition: opacity 0.12s ease-out;
    }

    /* --- Preview modal --- */
    #preview-modal {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    #preview-modal.active { opacity: 1; pointer-events: auto; }
    .preview-card {
      background: var(--glass-solid);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 16px;
      max-width: 360px; width: 100%;
      display: flex; flex-direction: column; align-items: center;
    }
    .preview-frame {
      width: 100%; border-radius: 12px; overflow: hidden;
      border: 2px solid var(--cyan); margin-bottom: 16px;
      aspect-ratio: 9/16; background: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-frame img { width: 100%; height: 100%; object-fit: cover; }
    .preview-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .btn-outline {
      width: 100%; background: transparent;
      border: 1.5px solid var(--cyan); color: var(--cyan);
      font-family: var(--font); font-size: 0.85rem; font-weight: 600;
      padding: 12px; border-radius: 24px; cursor: pointer;
    }
    .btn-ghost {
      background: none; border: none; color: #888;
      font-family: var(--font); font-size: 0.8rem; cursor: pointer;
      text-decoration: underline; margin-top: 4px;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DwivelMY.js"></script>
</head>
<body>
  <div id="debug-log-panel" style="position: fixed; top: 10px; left: 10px; right: 10px; background: rgba(0,0,0,0.85); color: #ff3333; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 8px; z-index: 99999; max-height: 200px; overflow-y: auto; word-break: break-all; border: 1px solid red;">
    <strong>Debug Log:</strong><br>
  </div>
  <script>
    (function() {
      const panel = document.getElementById('debug-log-panel');
      function log(msg) {
        panel.innerHTML += msg + '<br>';
        panel.scrollTop = panel.scrollHeight;
      }
      window.logToScreen = log;
      window.addEventListener('error', function(e) {
        let msg = 'ERR: ' + e.message + ' at ' + e.filename + ':' + e.lineno;
        if (e.error && e.error.stack) {
          msg += '<br>Stack: ' + e.error.stack.replace(/\n/g, '<br>');
        }
        log(msg);
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        let msg = 'REJ: ' + e.reason;
        if (e.reason && e.reason.stack) {
          msg += '<br>Stack: ' + e.reason.stack.replace(/\n/g, '<br>');
        }
        log(msg);
      });
      const originalConsoleError = console.error;
      console.error = function() {
        const args = Array.prototype.slice.call(arguments);
        let msg = 'CON_ERR: ' + args.join(' ');
        args.forEach(arg => {
          if (arg && arg.stack) {
            msg += '<br>Stack: ' + arg.stack.replace(/\n/g, '<br>');
          }
        });
        log(msg);
        originalConsoleError.apply(console, arguments);
      };
      const originalConsoleWarn = console.warn;
      console.warn = function() {
        log('CON_WARN: ' + Array.prototype.slice.call(arguments).join(' '));
        originalConsoleWarn.apply(console, arguments);
      };
      const originalConsoleLog = console.log;
      console.log = function() {
        log('CON_LOG: ' + Array.prototype.slice.call(arguments).join(' '));
        originalConsoleLog.apply(console, arguments);
      };
      log('Debugger initialized. UA: ' + navigator.userAgent);
      log('XR8 status: ' + (typeof window.XR8));
      window.addEventListener('xrloaded', function() {
        log('xrloaded event fired. XR8 status: ' + (typeof window.XR8));
      });
      document.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK' || e.target.tagName === 'IMG')) {
          log('NET_ERR: Failed to load ' + e.target.tagName + ' from ' + (e.target.src || e.target.href));
        }
      }, true);
    })();
  </script>

  <canvas id="camerafeed"></canvas>

  <!-- Menu Screen (shown before camera starts) -->
  <div id="menu-screen">
    <div class="menu-logo">BENCHMARK</div>
    <div class="menu-sub">Choose your experience</div>
    <div class="menu-cards">
      <div class="menu-card mascot" id="mascot-card">
        <div class="menu-card-icon">&#x1f680;</div>
        <div class="menu-card-title">Find the Mascot</div>
        <div class="menu-card-desc">Scan a target, place the mascot on the floor, and snap a photo!</div>
      </div>
      <div class="menu-card mask" id="mask-card">
        <div class="menu-card-icon">&#x1f3ad;</div>
        <div class="menu-card-title">Try the Mask</div>
        <div class="menu-card-desc">Use the front camera to wear the mascot mask on your face!</div>
      </div>
    </div>
  </div>

  <!-- Back button (visible during experience) -->
  <button id="back-btn">Back</button>

  <!-- HUD -->
  <div id="score-pill"></div>
  <div id="instruction"></div>

  <!-- Found overlay -->
  <div id="found-overlay">
    <div class="found-card">
      <div class="found-label">Target Found</div>
      <div class="found-title">Mascot Unlocked!</div>
      <div class="found-pts" id="found-points">+150</div>
      <div class="found-pts-label">Points</div>
      <button class="btn-primary" id="found-btn">Place Mascot</button>
    </div>
  </div>

  <!-- Shutter -->
  <div id="shutter-container"><button id="shutter-btn"></button></div>

  <!-- Flash -->
  <div id="flash-container"></div>

  <!-- Preview -->
  <div id="preview-modal">
    <div class="preview-card">
      <div class="preview-frame">
        <img id="preview-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Photo">
      </div>
      <div class="preview-actions">
        <button class="btn-primary" id="share-btn">Share</button>
        <button class="btn-outline" id="download-btn">Save to Device</button>
        <button class="btn-ghost" id="close-preview-btn">Retake</button>
      </div>
    </div>
  </div>

</body>
</html>
